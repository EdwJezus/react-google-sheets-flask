<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta charset="utf-8">
<style>
    html {
        background-color: rgb(140, 206, 206);
        font-family: 'Roboto', sans-serif;
        font-size: 16px;
    }
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 30px;
    }
    fieldset {
        background-color: white;
        padding: 80px;
        border: none;
        border-radius: 10px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px,
                    rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
    }
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    input {
        width: 350px;
        padding: 14px 18px;
        font-size: 16px;
        border: 2px solid #d6d6d6;
        border-radius: 12px;
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
    }
    button {
        padding: 14px;
        font-size: 16px;
        font-weight: bold;
        background-color: rgb(124, 177, 177);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
    }
</style>
<title>Home</title>
</head>
<body>

    <h1> Buscador de processo (login) </h1>

    <fieldset>
        <form action="/login_user" method="post">
            <input type="text" id="numero_processo" name="numero_processo" placeholder="Digite o número do processo" required>
            
            <input type="password" id="senha_processo" name="senha_processo" placeholder="Digite a senha" required>
            
            <button type="submit">Enviar</button>
        </form>
    </fieldset>

</body>
</html>
